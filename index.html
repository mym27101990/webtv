<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV en Vivo - Guía de Canales</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root{--bg:#0a0a0f;--bg-secondary:#101018;--card:#181828;--card-hover:#20203a;--border:#282845;--fg:#eaeaf0;--fg-muted:#7a7a9a;--accent:#e63946;--accent-glow:rgba(230,57,70,.35);--gold:#f4a623;--gold-glow:rgba(244,166,35,.25);--success:#2ecc71}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Source Sans 3',sans-serif;background:var(--bg);color:var(--fg);height:100vh;overflow:hidden}
        .bg-atmosphere{position:fixed;inset:0;z-index:0;pointer-events:none}
        .bg-atmosphere::before{content:'';position:absolute;top:-30%;left:-20%;width:70%;height:70%;background:radial-gradient(ellipse,rgba(230,57,70,.05) 0%,transparent 70%);animation:b1 20s ease-in-out infinite}
        .bg-atmosphere::after{content:'';position:absolute;bottom:-20%;right:-15%;width:60%;height:60%;background:radial-gradient(ellipse,rgba(244,166,35,.03) 0%,transparent 70%);animation:b2 25s ease-in-out infinite}
        @keyframes b1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(10%,15%) scale(1.1)}}
        @keyframes b2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-8%,-12%) scale(1.15)}}
        .particles{position:fixed;inset:0;z-index:0;pointer-events:none}
        .particle{position:absolute;width:2px;height:2px;background:var(--accent);border-radius:50%;opacity:0;animation:pF linear infinite}
        @keyframes pF{0%{opacity:0;transform:translateY(100vh) scale(0)}10%{opacity:.5}90%{opacity:.2}100%{opacity:0;transform:translateY(-10vh) scale(1)}}
        .scanlines{position:fixed;inset:0;z-index:1;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.02) 2px,rgba(0,0,0,.02) 4px)}
        header{position:relative;z-index:10;padding:12px 28px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(10,10,15,.9);backdrop-filter:blur(20px)}
        .logo-group{display:flex;align-items:center;gap:12px}
        .logo-icon{width:40px;height:40px;background:linear-gradient(135deg,var(--accent),var(--gold));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;box-shadow:0 0 18px var(--accent-glow);animation:lP 3s ease-in-out infinite}
        @keyframes lP{0%,100%{box-shadow:0 0 18px var(--accent-glow)}50%{box-shadow:0 0 28px var(--accent-glow),0 0 45px rgba(230,57,70,.12)}}
        .logo-text{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;background:linear-gradient(90deg,var(--fg),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .header-right{display:flex;align-items:center;gap:20px}
        .live-badge{display:flex;align-items:center;gap:7px;background:rgba(230,57,70,.12);border:1px solid rgba(230,57,70,.25);padding:5px 14px;border-radius:18px;font-size:12px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1px}
        .live-dot{width:7px;height:7px;background:var(--accent);border-radius:50%;animation:blk 1.2s ease-in-out infinite}
        @keyframes blk{0%,100%{opacity:1;box-shadow:0 0 5px var(--accent)}50%{opacity:.25;box-shadow:none}}
        .clock{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--fg-muted);letter-spacing:2px}
        .main-layout{position:relative;z-index:5;display:grid;grid-template-columns:1fr 300px;height:calc(100vh - 65px)}
        .player-section{display:flex;flex-direction:column;padding:16px;gap:12px}
        .player-wrapper{flex:1;position:relative;background:#000;border-radius:14px;overflow:hidden;border:1px solid var(--border);box-shadow:0 6px 35px rgba(0,0,0,.5);transition:box-shadow .5s}
        .player-wrapper.active{box-shadow:0 6px 35px rgba(0,0,0,.5),0 0 50px var(--accent-glow)}
        .player-wrapper iframe{width:100%;height:100%;border:none;display:block}
        .player-placeholder{position:absolute;inset:0;z-index:4;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:linear-gradient(160deg,#0d0d18,#141428);transition:opacity .4s,visibility .4s}
        .player-placeholder.hidden{opacity:0;visibility:hidden;pointer-events:none}
        .placeholder-icon{width:90px;height:90px;border:2px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;color:var(--fg-muted);animation:ppP 2.5s ease-in-out infinite}
        @keyframes ppP{0%,100%{border-color:var(--border);transform:scale(1)}50%{border-color:var(--accent);transform:scale(1.04)}}
        .placeholder-text{font-size:17px;color:var(--fg-muted);text-align:center;line-height:1.6}
        .placeholder-text span{display:block;font-size:12px;color:rgba(122,122,154,.5);margin-top:4px}
        .player-bar{display:flex;align-items:center;justify-content:space-between;padding:0 2px}
        .now-playing-channel{font-weight:700;font-size:14px}
        .now-playing-sub{font-size:12px;color:var(--fg-muted)}
        .bar-actions{display:flex;gap:8px}
        .btn-icon{background:var(--card);border:1px solid var(--border);color:var(--fg-muted);width:36px;height:36px;border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .2s}
        .btn-icon:hover{background:var(--card-hover);color:var(--fg);border-color:var(--accent)}
        .btn-icon:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
        .btn-icon.fs-active{color:var(--accent);border-color:var(--accent)}
        .source-selector{display:flex;align-items:center;gap:8px;padding:2px 2px;flex-wrap:wrap;max-height:0;overflow:hidden;opacity:0;transition:max-height .35s ease,opacity .3s ease,margin .3s ease;margin:0}
        .source-selector.show{max-height:50px;opacity:1;margin:0}
        .source-label{font-size:12px;color:var(--fg-muted);white-space:nowrap;display:flex;align-items:center;gap:5px}
        .source-label i{color:var(--gold);font-size:11px}
        .source-btn{background:var(--card);border:1px solid var(--border);color:var(--fg-muted);padding:5px 16px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;font-family:'Source Sans 3',sans-serif;white-space:nowrap}
        .source-btn:hover{background:var(--card-hover);color:var(--fg);border-color:rgba(255,255,255,.15)}
        .source-btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
        .source-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 0 14px var(--accent-glow)}
        .info-strip{display:flex;align-items:center;gap:14px;padding:8px 14px;background:var(--card);border-radius:8px;border:1px solid var(--border);font-size:12px;color:var(--fg-muted);flex-wrap:wrap}
        .info-strip i{font-size:11px;color:var(--gold)}
        .info-sep{width:1px;height:14px;background:var(--border)}
        .sidebar{background:var(--bg-secondary);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
        .sidebar-head{padding:16px 16px 12px;border-bottom:1px solid var(--border)}
        .sidebar-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px}
        .sidebar-count{font-size:11px;color:var(--fg-muted);text-transform:uppercase;letter-spacing:1px;margin-top:4px}
        .sidebar-count strong{color:var(--gold)}
        .cat-label{padding:10px 16px 4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--fg-muted)}
        .subcat-label{padding:8px 16px 4px 28px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--gold);display:flex;align-items:center;gap:7px}
        .subcat-label::before{content:'';display:inline-block;width:3px;height:12px;background:var(--gold);border-radius:2px;flex-shrink:0}
        .channel-list{flex:1;overflow-y:auto;padding:2px 10px 16px}
        .channel-list::-webkit-scrollbar{width:3px}
        .channel-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
        .ch-card{display:flex;align-items:center;gap:12px;padding:10px 12px;margin-bottom:3px;border-radius:10px;cursor:pointer;transition:all .2s;border:1px solid transparent}
        .ch-card:hover{background:var(--card);border-color:var(--border);transform:translateX(3px)}
        .ch-card:focus-visible{outline:2px solid var(--accent);outline-offset:-2px}
        .ch-card.active{background:var(--card-hover);border-color:var(--accent);box-shadow:0 0 18px var(--accent-glow),inset 0 0 18px rgba(230,57,70,.04)}
        .ch-card.active .ch-num{color:var(--accent)}
        .ch-num{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--fg-muted);min-width:28px;text-align:center;transition:color .2s}
        .ch-logo{width:42px;height:42px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;overflow:hidden;border:1px solid rgba(255,255,255,.06)}
        .ch-logo img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;padding:5px;border-radius:7px;z-index:2}
        .ch-logo-fb{font-family:'Bebas Neue',sans-serif;font-size:7px;font-weight:700;color:rgba(255,255,255,.9);letter-spacing:.4px;text-align:center;line-height:1.15;z-index:1;padding:3px;text-transform:uppercase}
        .ch-logo::after{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:linear-gradient(135deg,transparent 40%,rgba(255,255,255,.07) 50%,transparent 60%);animation:sh 5s ease-in-out infinite;z-index:3;pointer-events:none}
        @keyframes sh{0%,100%{transform:translateX(-100%) rotate(25deg)}50%{transform:translateX(100%) rotate(25deg)}}
        .ch-info{flex:1;min-width:0}
        .ch-name{font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .ch-desc{font-size:11px;color:var(--fg-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .ch-status{display:flex;flex-direction:column;align-items:flex-end;gap:3px}
        .ch-live{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--success);display:flex;align-items:center;gap:4px}
        .ch-live::before{content:'';width:4px;height:4px;background:var(--success);border-radius:50%;animation:blk 1.2s ease-in-out infinite}
        .ch-search-tag{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--gold);display:flex;align-items:center;gap:4px}
        .ch-search-tag i{font-size:8px}
        .ch-hd{font-size:10px;color:var(--fg-muted)}
        .num-overlay{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:90;background:rgba(10,10,15,.93);backdrop-filter:blur(14px);border:1px solid var(--border);border-radius:14px;padding:14px 28px;display:flex;align-items:center;gap:14px;opacity:0;visibility:hidden;transition:all .2s}
        .num-overlay.show{opacity:1;visibility:visible}
        .num-digits{font-family:'Bebas Neue',sans-serif;font-size:38px;color:var(--gold);letter-spacing:3px;min-width:50px;text-align:center}
        .num-name{font-size:15px;font-weight:600}
        .num-hint{font-size:10px;color:var(--fg-muted);margin-top:2px}
        .toast-box{position:fixed;top:80px;right:20px;z-index:100;display:flex;flex-direction:column;gap:6px}
        .toast{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--accent);padding:10px 18px;border-radius:8px;font-size:13px;box-shadow:0 6px 25px rgba(0,0,0,.4);display:flex;align-items:center;gap:8px;animation:tI .3s ease-out,tO .25s ease-in 2.2s forwards;backdrop-filter:blur(10px)}
        .toast i{color:var(--accent);font-size:12px}
        .toast.toast-gold{border-left-color:var(--gold)}
        .toast.toast-gold i{color:var(--gold)}
        @keyframes tI{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
        @keyframes tO{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(30px)}}
        .search-modal{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:all .3s ease}
        .search-modal.show{opacity:1;visibility:visible}
        .search-modal-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px)}
        .search-modal-content{position:relative;width:92%;max-width:700px;max-height:82vh;background:var(--bg-secondary);border:1px solid var(--border);border-radius:16px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.6);transform:translateY(20px) scale(.97);transition:transform .3s ease}
        .search-modal.show .search-modal-content{transform:translateY(0) scale(1)}
        .search-modal-header{display:flex;align-items:flex-start;justify-content:space-between;padding:18px 20px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
        .search-modal-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--fg);display:flex;align-items:center;gap:8px}
        .search-modal-query{font-size:12px;color:var(--gold);margin-top:4px;word-break:break-word;max-width:520px;line-height:1.4}
        .search-modal-body{flex:1;overflow-y:auto;padding:12px 16px 16px}
        .search-modal-body::-webkit-scrollbar{width:4px}
        .search-modal-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
        .search-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:48px 20px;color:var(--fg-muted);font-size:14px}
        .search-spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        .search-loading .search-status{font-size:12px;color:rgba(122,122,154,.6);text-align:center;line-height:1.5;max-width:320px}
        .search-empty{text-align:center;padding:40px 20px;color:var(--fg-muted)}
        .search-empty i{font-size:36px;margin-bottom:12px;display:block;color:var(--border)}
        .search-empty p{font-size:14px;line-height:1.6}
        .search-empty a{color:var(--gold);text-decoration:none;font-weight:600}
        .search-empty a:hover{text-decoration:underline}
        .yt-result{display:flex;gap:14px;padding:12px;border-radius:10px;cursor:pointer;transition:all .2s;border:1px solid transparent;margin-bottom:6px}
        .yt-result:hover{background:var(--card);border-color:var(--border);transform:translateX(3px)}
        .yt-result:focus-visible{outline:2px solid var(--accent);outline-offset:-2px}
        .yt-thumb{position:relative;width:168px;height:94px;border-radius:8px;overflow:hidden;flex-shrink:0;background:var(--card)}
        .yt-thumb img{width:100%;height:100%;object-fit:cover;display:block}
        .yt-thumb-overlay{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,.85);padding:2px 6px;border-radius:4px;font-size:11px;font-weight:700;color:#fff;letter-spacing:.5px}
        .yt-thumb-live{position:absolute;top:6px;left:6px;background:var(--accent);padding:2px 8px;border-radius:4px;font-size:9px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:1px;animation:blk 1.2s ease-in-out infinite;display:flex;align-items:center;gap:4px}
        .yt-thumb-live::before{content:'';width:5px;height:5px;background:#fff;border-radius:50%}
        .yt-meta{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;gap:6px}
        .yt-title{font-size:13px;font-weight:600;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
        .yt-channel{font-size:11px;color:var(--fg-muted);display:flex;align-items:center;gap:5px}
        .yt-channel i{font-size:10px;color:var(--accent)}
        .yt-play-btn{align-self:flex-start;margin-top:4px;background:var(--accent);color:#fff;border:none;padding:5px 14px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:5px;font-family:'Source Sans 3',sans-serif}
        .yt-play-btn:hover{background:#c62d3a;box-shadow:0 0 16px var(--accent-glow)}
        .search-footer{padding:12px 16px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
        .search-footer-info{font-size:11px;color:var(--fg-muted)}
        .search-footer-actions{display:flex;gap:8px}
        .btn-sm{background:var(--card);border:1px solid var(--border);color:var(--fg-muted);padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;font-family:'Source Sans 3',sans-serif;display:flex;align-items:center;gap:5px}
        .btn-sm:hover{background:var(--card-hover);color:var(--fg);border-color:rgba(255,255,255,.15)}
        .btn-sm.btn-gold{border-color:rgba(244,166,35,.3);color:var(--gold)}
        .btn-sm.btn-gold:hover{background:rgba(244,166,35,.1);border-color:var(--gold)}
        .btn-sm:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
        .search-manual{padding:12px 16px;border-top:1px solid var(--border);flex-shrink:0;display:flex;gap:8px}
        .search-input{flex:1;background:var(--card);border:1px solid var(--border);color:var(--fg);padding:8px 14px;border-radius:8px;font-size:13px;font-family:'Source Sans 3',sans-serif;outline:none;transition:border-color .2s}
        .search-input:focus{border-color:var(--gold)}
        .search-input::placeholder{color:var(--fg-muted)}
        @media(max-width:860px){.main-layout{grid-template-columns:1fr;grid-template-rows:55vh 1fr;height:calc(100vh - 65px)}.sidebar{border-left:none;border-top:1px solid var(--border)}header{padding:10px 14px}.player-section{padding:10px}.clock{display:none}.logo-text{font-size:22px}.search-modal-content{width:96%;max-height:88vh}.yt-thumb{width:130px;height:73px}}
        @media(max-width:480px){.ch-card{padding:8px;gap:8px}.ch-logo{width:36px;height:36px}.ch-logo-fb{font-size:6px}.ch-num{font-size:17px;min-width:22px}.info-strip{gap:6px;font-size:11px}.yt-result{flex-direction:column;gap:8px}.yt-thumb{width:100%;height:0;padding-bottom:56.25%}.search-modal-content{width:99%;border-radius:12px}}
        @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}}
    </style>
</head>
<body>
<div class="bg-atmosphere"></div>
<div class="scanlines"></div>
<div class="particles" id="particles"></div>
<header>
    <div class="logo-group"><div class="logo-icon"><i class="fas fa-tv"></i></div><div class="logo-text">TV EN VIVO</div></div>
    <div class="header-right"><div class="live-badge"><div class="live-dot"></div>En Vivo</div><div class="clock" id="clock">00:00:00</div></div>
</header>
<main class="main-layout">
    <section class="player-section">
        <div class="player-wrapper" id="playerWrapper">
            <div class="player-placeholder" id="placeholder"><div class="placeholder-icon"><i class="fas fa-satellite-dish"></i></div><div class="placeholder-text">Selecciona un canal para comenzar<span>Usa el panel lateral o presiona las teclas 1-22</span></div></div>
            <iframe id="playerIframe" allow="autoplay; encrypted-media" allowfullscreen style="display:none;"></iframe>
        </div>
        <div class="player-bar"><div><div class="now-playing-channel" id="npChannel">Ningún canal</div><div class="now-playing-sub" id="npSub">Esperando señal...</div></div><div class="bar-actions"><button class="btn-icon" id="btnExitFS" aria-label="Salir de pantalla completa" title="Salir de pantalla completa" style="display:none"><i class="fas fa-compress"></i></button><button class="btn-icon" id="btnFS" aria-label="Pantalla completa" title="Pantalla completa"><i class="fas fa-expand"></i></button></div></div>
        <div class="source-selector" id="sourceSelector"><div class="source-label"><i class="fas fa-satellite-dish"></i> Fuente:</div><button class="source-btn active" data-idx="0">Opción 1</button><button class="source-btn" data-idx="1">Opción 2</button><button class="source-btn" data-idx="2">Opción 3</button></div>
        <div class="info-strip"><div style="display:flex;align-items:center;gap:5px"><i class="fas fa-signal"></i> HD</div><div class="info-sep"></div><div style="display:flex;align-items:center;gap:5px"><i class="fas fa-volume-high"></i> Audio activo</div><div class="info-sep"></div><div style="display:flex;align-items:center;gap:5px"><i class="fas fa-globe"></i> Streaming</div><div class="info-sep"></div><div style="display:flex;align-items:center;gap:5px"><i class="fas fa-keyboard"></i> Teclas 1-22</div></div>
    </section>
    <aside class="sidebar"><div class="sidebar-head"><div class="sidebar-title">Guía de Canales</div><div class="sidebar-count"><strong>22</strong> canales disponibles</div></div><div class="channel-list" id="channelList" role="listbox" aria-label="Lista de canales"></div></aside>
</main>

<div class="search-modal" id="searchModal">
    <div class="search-modal-backdrop" id="searchBackdrop"></div>
    <div class="search-modal-content">
        <div class="search-modal-header">
            <div><div class="search-modal-title"><i class="fab fa-youtube" style="color:var(--accent)"></i> Buscar en YouTube</div><div class="search-modal-query" id="searchQueryText"></div></div>
            <button class="btn-icon" id="closeSearchModal" aria-label="Cerrar"><i class="fas fa-times"></i></button>
        </div>

    var ch=channels[index];if(!ch)return;
    if(currentChannel&&currentChannel.id===ch.id&&!ch.isSearchChannel&&si===undefined)return;

    if(ch.isSearchChannel){
        document.getElementById('npChannel').textContent=ch.name;

        var ifr=document.getElementById('playerIframe');
        ifr.style.display='none';ifr.removeAttribute('src');ifr.removeAttribute('srcdoc');

    document.getElementById('playerWrapper').classList.add('active');

    document.getElementById('npSub').textContent='Canal '+ch.number+' — '+ch.desc;

function extractVideosFromYtHtml(html){
    if(!html||html.length<1000)return[];

                if(ch==='{')depth++;else if(ch==='}'){depth--;if(depth===0){end=i+1;break;}}
            }

                    var contents=data.contents&&data.contents.twoColumnSearchResultsRenderer&&data.contents.twoColumnSearchResultsRenderer.primaryContents&&data.contents.twoColumnSearchResultsRenderer.primaryContents.sectionListRenderer&&data.contents.twoColumnSearchResultsRenderer.primaryContents.sectionListRenderer.contents;
                    if(contents&&contents[0]&&contents[0].itemSectionRenderer&&contents[0].itemSectionRenderer.contents){
                        contents[0].itemSectionRenderer.contents.forEach(function(item){
                            var v=item.videoRenderer;if(!v||!v.videoId||seen[v.videoId])return;
                            seen[v.videoId]=true;
                            var title=v.title&&v.title.runs&&v.title.runs[0]?v.title.runs[0].text:'Sin título';
                            var channel=v.ownerText&&v.ownerText.runs&&v.ownerText.runs[0]?v.ownerText.runs[0].text:'';
                            var dur=-1;
                            if(v.lengthText&&v.lengthText.simpleText){var p=v.lengthText.simpleText.split(':').map(Number);if(p.length===3)dur=p[0]*3600+p[1]*60+p[2];else if(p.length===2)dur=p[0]*60+p[1];}
                            var thumb=v.thumbnail&&v.thumbnail.thumbnails&&v.thumbnail.thumbnails[0]?v.thumbnail.thumbnails[0].url:'';
                            var isLive=false;
                            if(v.badges)v.badges.forEach(function(b){if(b.metadataBadgeRenderer&&(b.metadataBadgeRenderer.label==='LIVE'||b.metadataBadgeRenderer.style==='BADGE_STYLE_TYPE_LIVE_NOW'))isLive=true;if(b.liveBadgeRenderer)isLive=true;});
                            results.push({videoId:v.videoId,title:title,channel:channel,duration:dur,thumbnail:thumb||'https://img.youtube.com/vi/'+v.videoId+'/mqdefault.jpg',isLive:isLive});
                        });
                    }
                }catch(e2){}
            }
        }
    }catch(e){}
    if(results.length>0)return results;
    var parts=html.split('"videoId":"');
    for(var j=1;j<parts.length;j++){
        var m=parts[j].match(/^([a-zA-Z0-9_-]{11})"/);
        if(!m)continue;
        var vid=m[1];if(seen[vid])continue;seen[vid]=true;
        var prev=parts[j-1].substring(Math.max(0,parts[j-1].length-3000));
        var titleMatch=prev.match(/"text"\s*:\s*"([^"]{15,250})"/g);
        var title='Video de YouTube';
        if(titleMatch&&titleMatch.length>=2)title=titleMatch[titleMatch.length-2].replace(/"text"\s*:\s*"/,'').replace(/"$/,'');
        else if(titleMatch&&titleMatch.length===1)title=titleMatch[0].replace(/"text"\s*:\s*"/,'').replace(/"$/,'');
        var chanMatch=prev.match(/"ownerText".*?"text"\s*:\s*"([^"]{2,80})"/);
        var channel=chanMatch?chanMatch[1]:'';
        var durMatch=prev.match(/"lengthText"\s*:\s*\{[^}]*"simpleText"\s*:\s*"([^"]+)"/);
        var dur=-1;
        if(durMatch){var dp=durMatch[1].split(':').map(Number);if(dp.length===3)dur=dp[0]*3600+dp[1]*60+dp[2];else if(dp.length===2)dur=dp[0]*60+dp[1];}
        var isLive=prev.indexOf('BADGE_STYLE_TYPE_LIVE_NOW')!==-1||prev.indexOf('"liveBadgeRenderer"')!==-1;
        results.push({videoId:vid,title:title,channel:channel,duration:dur,thumbnail:'https://img.youtube.com/vi/'+vid+'/mqdefault.jpg',isLive:isLive});
        if(results.length>=20)break;
    }
    return results;
}

function fmtDur(s){if(s<0)return'EN VIVO';var h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;return h>0?h+':'+String(m).padStart(2,'0')+':'+String(sc).padStart(2,'0'):m+':'+String(sc).padStart(2,'0');}

if(!Promise.any){Promise.any=function(ps){return new Promise(function(res,rej){if(!ps.length){rej(new Error('empty'));return;}var rejs=[],rem=ps.length;ps.forEach(function(p,i){Promise.resolve(p).then(res).catch(function(e){rejs[i]=e;rem--;if(rem===0)rej(new Error('all failed'));});});});};}

function performSearch(query){
    lastSearchQuery=query;
    searchQueryText.textContent=query;
    manualSearchInput.value=query;
    searchFooterInfo.textContent='';
    searchResults.innerHTML='<div class="search-loading"><div class="search-spinner"></div><div>Conectando con YouTube...</div><div class="search-status" id="sStatus">Descargando página de resultados...</div></div>';
    if(statusTimer)clearInterval(statusTimer);
    var msgs=['Descargando página de resultados...','Analizando HTML recibido...','Extrayendo videos...','Procesando datos...'];
    var mi=0;
    statusTimer=setInterval(function(){mi++;var el=document.getElementById('sStatus');if(el)el.textContent=msgs[mi%msgs.length];},2000);
    var ytUrl='https://www.youtube.com/results?search_query='+encodeURIComponent(query);
    var p1=fetchText('https://api.allorigins.win/raw?url='+encodeURIComponent(ytUrl),12000).then(function(html){console.log('[YT] allorigins: '+html.length+' chars');var r=extractVideosFromYtHtml(html);if(r.length>0)return r;throw new Error('vacío');});
    var p2=fetchText('https://corsproxy.io/?'+encodeURIComponent(ytUrl),12000).then(function(html){console.log('[YT] corsproxy: '+html.length+' chars');var r=extractVideosFromYtHtml(html);if(r.length>0)return r;throw new Error('vacío');});
    var invUrl='https://invidious.fdn.fr/api/v1/search?q='+encodeURIComponent(query)+'&type=video';
    var p3=fetchText('https://api.allorigins.win/raw?url='+encodeURIComponent(invUrl),10000).then(function(txt){var data=JSON.parse(txt);if(!Array.isArray(data))throw new Error('no array');return data.filter(function(x){return x.type==='video'&&x.videoId;}).map(function(x){var thumb='';if(x.videoThumbnails&&x.videoThumbnails.length){var b=x.videoThumbnails.find(function(t){return t.quality==='medium';});thumb=b?b.url:x.videoThumbnails[0].url;}return{videoId:x.videoId,title:x.title||'Sin título',channel:x.author||'',duration:x.lengthSeconds,thumbnail:thumb,isLive:x.lengthSeconds===-1||x.liveNow===true};});}).then(function(r){if(r.length>0)return r;throw new Error('vacío');});
    Promise.any([p1,p2,p3]).then(function(results){
        if(statusTimer)clearInterval(statusTimer);
        console.log('[YT] EXITO: '+results.length+' videos');
        renderResults(results,query);
    }).catch(function(err){
        if(statusTimer)clearInterval(statusTimer);
        console.log('[YT] FALLO TOTAL:',err);
        renderResults([],query);
    });
}

function renderResults(results,query){
    searchFooterInfo.textContent=results.length+' resultado'+(results.length!==1?'s':'');
    if(!results.length){
        searchResults.innerHTML='<div class="search-empty"><i class="fas fa-exclamation-triangle" style="color:var(--gold)"></i><p>No se pudieron obtener resultados.</p><p style="margin-top:12px"><a href="https://www.youtube.com/results?search_query='+encodeURIComponent(query)+'" target="_blank" rel="noopener"><i class="fab fa-youtube"></i> Buscar directamente en YouTube</a></p></div>';
        return;
    }
    results.sort(function(a,b){if(a.isLive&&!b.isLive)return -1;if(!a.isLive&&b.isLive)return 1;return 0;});
    var html='';
    results.forEach(function(r){
        var liveB=r.isLive?'<div class="yt-thumb-live">EN VIVO</div>':'';
        var durB='<div class="yt-thumb-overlay">'+fmtDur(r.duration)+'</div>';
        var ts=r.thumbnail||'https://img.youtube.com/vi/'+r.videoId+'/mqdefault.jpg';
        var safeT=r.title.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        html+='<div class="yt-result" tabindex="0" role="button" data-vid="'+r.videoId+'" data-title="'+safeT+'"><div class="yt-thumb"><img src="'+ts+'" alt="" loading="lazy" onerror="this.src=\'https://img.youtube.com/vi/'+r.videoId+'/mqdefault.jpg\'">'+liveB+durB+'</div><div class="yt-meta"><div class="yt-title">'+r.title+'</div><div class="yt-channel"><i class="fas fa-user-circle"></i> '+(r.channel||'')+'</div><div class="yt-play-btn"><i class="fas fa-play"></i> Reproducir</div></div></div>';
    });
    searchResults.innerHTML=html;
    searchResults.scrollTop=0;
    searchResults.querySelectorAll('.yt-result').forEach(function(el){
        function go(){playYT(el.dataset.vid,el.dataset.title.replace(/&amp;/g,'&').replace(/&quot;/g,'"').replace(/&lt;/g,'<').replace(/&gt;/g,'>'));}
        el.addEventListener('click',go);
        el.addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();go();}});
    });
}

/* Modal */
function openSearchModal(q){searchModal.classList.add('show');performSearch(q||getChiringuitoQuery());}
function closeSearchModal(){searchModal.classList.remove('show');if(statusTimer)clearInterval(statusTimer);}
document.getElementById('searchBackdrop').addEventListener('click',closeSearchModal);
document.getElementById('closeSearchModal').addEventListener('click',closeSearchModal);
document.getElementById('manualSearchBtn').addEventListener('click',function(){var q=manualSearchInput.value.trim();if(q)performSearch(q);});
manualSearchInput.addEventListener('keydown',function(e){if(e.key==='Enter'){var q=this.value.trim();if(q)performSearch(q);}});
document.getElementById('openYtBtn').addEventListener('click',function(){window.open('https://www.youtube.com/results?search_query='+encodeURIComponent(lastSearchQuery),'_blank');});

/* ===========================================================
   REPRODUCIR VIDEO DE YOUTUBE
   — Usa iframe.src directo (NO srcdoc) hacia Piped/Invidious
   — Evita Error 153 porque no toca la API oficial de YouTube
   — Permite cambiar de instancia si una está caída
   =========================================================== */
function playYT(videoId,title){
    closeSearchModal();

    /* Guardar estado del video actual */
    ytPlayingVideoId=videoId;
    ytSourceIdx=0;

    /* Ocultar placeholder, mostrar player */
    document.getElementById('placeholder').classList.add('hidden');
    document.getElementById('playerWrapper').classList.add('active');

    /* Limpiar iframe completamente */
    var ifr=document.getElementById('playerIframe');
    ifr.removeAttribute('srcdoc');

    /* Configurar botones de fuente para YouTube */
    setupYtSourceButtons();

    /* Cargar embed directamente en iframe.src */
    loadYtEmbed(videoId);

    /* Si hay volume interval, limpiarlo */
    if(volumeInterval){clearInterval(volumeInterval);volumeInterval=null;}

    /* Actualizar info del player */
    document.getElementById('npChannel').textContent='El Chiringuito';
    document.getElementById('npSub').textContent=title?title.substring(0,65)+(title.length>65?'...':''):'YouTube';
    showToast('Reproduciendo via '+YT_EMBED_SOURCES[0].name,true);
}

/* ===========================================================
   TECLADO
   =========================================================== */
document.addEventListener('keydown',function(e){
    if(searchModal.classList.contains('show')){if(e.key==='Escape'){e.preventDefault();closeSearchModal();}return;}
    if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
    if(e.key>='1'&&e.key<='9'){e.preventDefault();numBuffer+=e.key;showNumO(parseInt(numBuffer));return;}
    if(e.key==='0'&&numBuffer.length>0){e.preventDefault();numBuffer+='0';showNumO(parseInt(numBuffer));return;}
    if(e.key==='Enter'&&numBuffer){e.preventDefault();confirmNum();return;}
    if(e.key==='Escape'){clearTimeout(numTimer);numBuffer='';document.getElementById('numOverlay').classList.remove('show');return;}
    if(e.key==='ArrowDown'||e.key==='ArrowUp'){e.preventDefault();var ci=currentChannel?channels.indexOf(currentChannel):-1;var ni=e.key==='ArrowDown'?(ci<channels.length-1?ci+1:0):(ci>0?ci-1:channels.length-1);tuneChannel(ni);return;}
    if(e.key==='f'||e.key==='F')tFS();
});
